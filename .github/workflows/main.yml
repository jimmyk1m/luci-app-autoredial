name: Build OpenWrt LuCI App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 允许手动触发，方便调试
  workflow_dispatch:
    inputs:
      snapsdk-url:
        description: "Snapshot OpenWrt SDK .tar.zst URL"
        required: true
        default: "https://downloads.openwrt.org/releases/25.12.0/targets/rockchip/armv8/openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SNAPSDK_URL: ${{ github.event.inputs.snapsdk-url || 'https://downloads.openwrt.org/releases/25.12.0/targets/rockchip/armv8/openwrt-sdk-25.12.0-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Package Info from Makefile
        id: get_info
        run: |
          PKG_NAME=$(grep -oP '(?<=call BuildPackage,)[^)]+' Makefile | head -n1 | xargs)
          VERSION=$(grep 'PKG_VERSION:=' Makefile | awk -F ':=' '{print $2}' | xargs)
          
          if [ -z "$PKG_NAME" ]; then
            echo "Error: Could not detect PKG_NAME from Makefile."
            exit 1
          fi
          
          echo "pkg_name=${PKG_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected Package: ${PKG_NAME}, Version: ${VERSION}"

      - name: Install system dependencies & po2lmo
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive \
            apt-get install -y curl git tar zstd python3-pip
          pip3 install --upgrade pip
          pip3 install po2lmo

      - name: Download Snapshot OpenWrt SDK
        run: |
          mkdir -p /tmp/SNAPSDK
          curl -SLk --connect-timeout 30 --retry 2 \
            "${{ inputs.snapsdk-url || github.event.inputs.snapsdk-url }}" \
            -o /tmp/SNAPSDK.tar.zst
          zstd -d /tmp/SNAPSDK.tar.zst
          tar xf /tmp/SNAPSDK.tar --strip-components=1 -C /tmp/SNAPSDK

      - name: Copy source into SDKs
        run: |
          PKG_NAME="${{ steps.get_info.outputs.pkg_name }}"
          mkdir -p /tmp/SNAPSDK/package/${PKG_NAME}
          rsync -avh --exclude='.git' . /tmp/SNAPSDK/package/${PKG_NAME}

      - name: Compile APK with Snapshot SDK
        run: |
          cd /tmp/SNAPSDK
          PKG_NAME="${{ steps.get_info.outputs.pkg_name }}"
          ./scripts/feeds update -a
          ./scripts/feeds install ${PKG_NAME}
          echo "CONFIG_PACKAGE_${PKG_NAME}=y" > .config
          make defconfig
          make package/${PKG_NAME}/compile V=99

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          PKG_NAME="${{ steps.get_info.outputs.pkg_name }}"
          
          echo "Searching for APK..."
          find /tmp/SNAPSDK/bin -name "${PKG_NAME}*.apk" -exec cp {} "./artifacts/" \;
          
          echo "v${{ steps.get_info.outputs.version }}" > artifacts/version.txt
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LuCI-Package-${{ steps.get_info.outputs.version }}
          path: artifacts

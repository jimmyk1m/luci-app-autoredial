name: "Build OpenWrt LuCI App"
description: "Composite Action: compile LuCI package into .ipk/.apk and upload artifacts"

# 移除了 inputs.package，改为自动读取
inputs:
  sdk-url:
    description: "Legacy OpenWrt SDK .tar.bz2 URL"
    required: true
  snapsdk-url:
    description: "Snapshot OpenWrt SDK .tar.zst URL"
    required: true

outputs:
  version:
    description: "Package version extracted from Makefile"
    value: ${{ steps.get_info.outputs.version }}
  pkg_name:
    description: "Package name extracted from Makefile"
    value: ${{ steps.get_info.outputs.pkg_name }}

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get Package Info from Makefile
      id: get_info
      shell: bash
      run: |
        # 1. 解析 PKG_NAME (对应 BuildPackage 的第一个参数)
        # 匹配 call BuildPackage,后面的内容，去掉括号和空格
        PKG_NAME=$(grep -oP '(?<=call BuildPackage,)[^)]+' Makefile | head -n1 | xargs)
        
        if [ -z "$PKG_NAME" ]; then
          echo "Error: Could not detect PKG_NAME from Makefile in repo root."
          exit 1
        fi

        # 2. 解析 PKG_VERSION
        VERSION=$(grep 'PKG_VERSION:=' Makefile | awk -F ':=' '{print $2}' | xargs)
        
        echo "pkg_name=${PKG_NAME}" >> $GITHUB_OUTPUT
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Detected Package: ${PKG_NAME}, Version: ${VERSION}"

    - name: Install system dependencies & po2lmo
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive \
          apt-get install -y curl git tar zstd python3-pip
        pip3 install --upgrade pip
        pip3 install po2lmo

    - name: Download Legacy OpenWrt SDK
      shell: bash
      run: |
        mkdir -p /tmp/SDK
        curl -SLk --connect-timeout 30 --retry 2 \
          "${{ inputs['sdk-url'] }}" \
          -o /tmp/SDK.tar.bz2
        tar xjf /tmp/SDK.tar.bz2 \
            --strip-components=1 -C /tmp/SDK

    - name: Download Snapshot OpenWrt SDK
      shell: bash
      run: |
        mkdir -p /tmp/SNAPSDK
        curl -SLk --connect-timeout 30 --retry 2 \
          "${{ inputs['snapsdk-url'] }}" \
          -o /tmp/SNAPSDK.tar.zst
        zstd -d /tmp/SNAPSDK.tar.zst
        tar xf /tmp/SNAPSDK.tar \
            --strip-components=1 -C /tmp/SNAPSDK

    - name: Copy source into SDKs
      shell: bash
      run: |
        # 使用解析出来的包名创建目录
        PKG_NAME="${{ steps.get_info.outputs.pkg_name }}"
        
        mkdir -p /tmp/SDK/package/${PKG_NAME}
        mkdir -p /tmp/SNAPSDK/package/${PKG_NAME}
        
        # 将仓库根目录复制到 SDK 中
        rsync -avh --exclude='.git' . /tmp/SDK/package/${PKG_NAME}
        rsync -avh --exclude='.git' . /tmp/SNAPSDK/package/${PKG_NAME}

    - name: Compile IPK with Legacy SDK
      shell: bash
      run: |
        cd /tmp/SDK
        PKG_NAME="${{ steps.get_info.outputs.pkg_name }}"
        
        ./scripts/feeds update -a
        ./scripts/feeds install ${PKG_NAME}
        
        echo "CONFIG_PACKAGE_${PKG_NAME}=y" > .config
        make defconfig
        make package/${PKG_NAME}/compile V=99

    - name: Compile APK with Snapshot SDK
      shell: bash
      run: |
        cd /tmp/SNAPSDK
        PKG_NAME="${{ steps.get_info.outputs.pkg_name }}"
        
        ./scripts/feeds update -a
        ./scripts/feeds install ${PKG_NAME}
        
        echo "CONFIG_PACKAGE_${PKG_NAME}=y" > .config
        make defconfig
        make package/${PKG_NAME}/compile V=99

    - name: Collect artifacts
      shell: bash
      run: |
        mkdir -p artifacts
        PKG_NAME="${{ steps.get_info.outputs.pkg_name }}"
        
        # 1. 查找并复制 Legacy SDK 的 IPK
        # 使用 find 自动匹配架构路径 (如 ar71xx, x86, aarch64等)
        echo "Searching for IPK..."
        find /tmp/SDK/bin -name "${PKG_NAME}*.ipk" -exec cp {} "./artifacts/" \;
        
        # 2. 查找并复制 Snapshot SDK 的 APK
        echo "Searching for APK..."
        find /tmp/SNAPSDK/bin -name "${PKG_NAME}*.apk" -exec cp {} "./artifacts/" \;
        
        # 3. 写入版本信息
        echo "v${{ steps.get_info.outputs.version }}" > artifacts/version.txt
        
        ls -lh artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LuCI-Package-${{ steps.get_info.outputs.version }}
        path: artifacts
